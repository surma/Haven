name: CI

on:
  pull_request:
    branches:
      - main
    types:
      - opened
      - synchronize
      - reopened
      - ready_for_review
  push:
    branches:
      - main
    tags:
      - 'v*'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  nix-build:
    name: Nix build
    runs-on: [self-hosted, nix, Haven]
    timeout-minutes: 60
    permissions:
      contents: write

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Show toolchain versions
        run: |
          nix --version
          git --version

      - name: Build APKs
        run: nix build .#apk --accept-flake-config --print-build-logs

      - name: Collect build artifacts
        run: |
          set -euo pipefail
          mkdir -p dist

          apk_out="$(nix path-info .#apk --accept-flake-config)"
          find "$apk_out" -maxdepth 1 -type f -name '*.apk' -exec cp {} dist/ \;
          test -n "$(find dist -maxdepth 1 -type f -name '*.apk' -print -quit)"

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: haven-apks
          path: dist/*.apk
          if-no-files-found: error
          retention-days: 14

      - name: Create GitHub release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: dist/*.apk

      - name: Push to Cachix
        env:
          CACHIX_AUTH_TOKEN: ${{ secrets.CACHIX_AUTH_TOKEN }}
        run: |
          nix run nixpkgs#cachix -- authtoken "$CACHIX_AUTH_TOKEN"
          nix path-info .#apk --accept-flake-config \
            | nix run nixpkgs#cachix -- push surm-builds
