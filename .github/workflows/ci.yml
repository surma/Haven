name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Python 3.13
        uses: actions/setup-python@v6
        with:
          python-version: '3.13'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v4

      - name: Install SDK platform 36, CMake, and NDK
        run: sdkmanager "platforms;android-36" "cmake;3.31.6" "ndk;28.0.13004108" "ndk;27.0.12077973"

      - name: Set up Go toolchain
        uses: actions/setup-go@v6
        with:
          go-version: '1.26'
          cache-dependency-path: rclone-android/go/go.sum

      - name: Install gomobile
        run: |
          go install golang.org/x/mobile/cmd/gomobile@latest
          go install golang.org/x/mobile/cmd/gobind@latest

      - name: Set up Rust toolchain
        run: |
          rustup default stable
          rustup target add aarch64-linux-android x86_64-linux-android
          cargo install cargo-ndk --locked

      - name: Cache Gradle packages
        uses: actions/cache@v5
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties', '**/libs.versions.toml') }}
          restore-keys: gradle-${{ runner.os }}-

      - name: Cache Cargo registry
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            rdp-kotlin/rust/target
          key: cargo-${{ runner.os }}-${{ hashFiles('rdp-kotlin/rust/Cargo.lock') }}
          restore-keys: cargo-${{ runner.os }}-

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build debug APK
        run: ./gradlew assembleDebug

      - name: Run unit tests
        run: ./gradlew testDebugUnitTest

      - name: Run lint
        run: ./gradlew lintDebug

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: test-results
          path: '**/build/reports/tests/'
          retention-days: 14

      - name: Upload lint results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: lint-results
          path: |
            **/build/reports/lint-results-debug.html
            **/build/reports/lint-results-debug.xml
          if-no-files-found: ignore
          retention-days: 14

      - name: Upload debug APK
        if: success()
        uses: actions/upload-artifact@v7
        with:
          name: app-debug
          path: app/build/outputs/apk/*/debug/haven-*-debug.apk
          retention-days: 7
