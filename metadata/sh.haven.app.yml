AutoName: Haven

Description: |-
  Haven is an open source SSH, VNC, RDP, SFTP and cloud storage client for
  Android.

  Connect to your servers with a full terminal emulator, view remote desktops
  over VNC or RDP, browse and transfer files over SFTP, manage your SSH
  keys, and access 60+ cloud storage providers (Google Drive, Dropbox,
  OneDrive, S3, and more) via rclone — all from your phone. Supports Mosh,
  Eternal Terminal, and session managers (tmux, screen, zellij).

