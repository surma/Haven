  # v4.0.0+: Go/gomobile for rclone cloud storage, Rust/cargo-ndk for RDP
  - versionName: 4.3.4
    versionCode: 1401
    commit: v4.3.4
    subdir: app
    sudo:
      - apt-get update
      - apt-get install -y make gcc libc-dev golang-go
    srclibs:
      - go@go1.26.1
    prebuild:
      - sdkmanager 'platforms;android-35' 'build-tools;36.0.0'
    build:
      - pushd $$go$$/src
      - ./make.bash
      - popd
      - export PATH="$$go$$/bin:$PATH"
      - export GOPATH="$HOME/go"
      - go install golang.org/x/mobile/cmd/gomobile@latest
      - go install golang.org/x/mobile/cmd/gobind@latest
      - export PATH="$GOPATH/bin:$PATH"
      - export ANDROID_NDK_HOME=$$NDK$$
      - cd ../rclone-android
      - bash tools/build-android.sh
    ndk: 28.2.13676358
    gradle:
      - arm64

